<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Moloka - Test</title>
<style>
body { font-family: sans-serif; background: #0F1E2E; display:flex; align-items:center; justify-content:center; height:100vh; margin:0; }
.box { background:white; padding:32px; border-radius:16px; width:360px; text-align:center; }
input { width:100%; padding:10px; margin:8px 0; border:1px solid #ddd; border-radius:8px; box-sizing:border-box; font-size:14px; }
button { width:100%; padding:12px; background:#1A2E44; color:white; border:none; border-radius:8px; font-size:15px; cursor:pointer; margin-top:8px; }
.err { color:red; font-size:13px; margin:8px 0; display:none; }
</style>
</head>
<body>
<div class="box">
  <h2>Moloka Store</h2>
  <div class="err" id="err">Usuario o contrasena incorrectos</div>
  <input type="text" id="user" placeholder="Usuario" value="moloka">
  <input type="password" id="pass" placeholder="Contrasena">
  <button onclick="login()">Entrar</button>
</div>
<script>
var USERS = { 'moloka': 'Moloka2026!', 'elena': 'Moloka2026!' };
function login() {
  var u = document.getElementById('user').value.trim().toLowerCase();
  var p = document.getElementById('pass').value;
  if (USERS[u] && USERS[u] === p) {
    alert('LOGIN OK - funciona!');
  } else {
    document.getElementById('err').style.display = 'block';
  }
}
document.getElementById('pass').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') login();
});
</script>
</body>
</html>
