# ============================================================
# Moloka - Cerebro del trackeador (recomendaciones de precio)
# Ubicacion: .github/workflows/tracker-cerebro.yml
#
# Corre moloka_tracker_cerebro.py: lee la ULTIMA carga de monitor_snapshots por
# pais, decide que hacer con cada precio (subir/bajar/mantener/recuperar BB/no
# rentable/guerra/malvendiendo) y escribe recomendaciones en
# monitor_recomendaciones con estado PENDIENTE. NO cambia precios. No usa Keepa.
#
# Se dispara de DOS formas:
#   - Manual (Run workflow), con parametro 'pais': ES | IT | FR | ALL (def. ES).
#   - Encadenado: automaticamente cuando el snapshot ("Moloka - Trackeador")
#     termina bien (workflow_run). En ese caso el pais se queda en ES (default).
# ============================================================
name: Moloka - Cerebro Trackeador

on:
  workflow_dispatch:
    inputs:
      pais:
        description: 'Pais a procesar (ES | IT | FR | ALL)'
        required: false
        default: 'ES'
  workflow_run:
    workflows: ["Moloka - Trackeador"]
    types: [completed]

jobs:
  cerebro:
    runs-on: ubuntu-latest
    # Corre si es disparo manual, o si el snapshot encadenado acabo bien.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    timeout-minutes: 30
    steps:
      - name: Descargar el repo
        uses: actions/checkout@v4

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install supabase pandas   # pandas lo arrastra el import de moloka_tracker_snapshot

      - name: Ejecutar Cerebro
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python -u moloka_tracker_cerebro.py --pais "${{ github.event.inputs.pais || 'ES' }}"
