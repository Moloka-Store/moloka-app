# ============================================================
# Moloka - Detector de oportunidades BEMS (cada 30 min en horario comercial)
# Ubicacion: .github/workflows/detector-bems.yml
#
# QUE HACE: lanza moloka_detector_bems.py, que vigila las marcas de BEMS en modo
# "nuevos" y avisa por TELEGRAM si algo sale COMPRAR. Silencioso (sin Excel).
#
# HORARIO (cron de GitHub va en UTC; en verano España = UTC+2, invierno UTC+1):
#   - cada 30 min de 07:00 a 13:00 UTC  ==  09:00 a 15:00 hora peninsular (verano)
#   - repaso a 13:00 UTC (15:00) y a 15:00 UTC (17:00)
#   OJO: en invierno (UTC+1) esto se corre 1h antes en hora local (08:00-14:00 +
#   repasos 14:00 y 16:00). Si molesta, se ajusta el cron 1h. Aceptable.
#
# BLINDAJE:
#   - concurrency: si una corrida tarda mas de 30 min, la siguiente NO la pisa
#     (cancel-in-progress: false => la nueva espera, no se solapan).
#   - timeout-minutes: 25  => por debajo del intervalo de 30 min, corta corridas
#     zombi antes de que se acumulen.
#   - workflow_dispatch: ademas se puede lanzar a mano para probar.
# ============================================================
name: Moloka - Detector BEMS

on:
  # RELOJ EN PAUSA (2-jul-2026): BEMS lleva ~1 mes sin acceso a la API (sin compra
  # que lo reactive), asi que el detector saltaba y no hacia nada. Se deja SOLO el
  # disparo manual. Cuando se reactive la API de BEMS, descomentar el 'schedule:'
  # de abajo y volver a desplegar.
  # schedule:
  #   - cron: '0,30 7-12 * * 1-5'    # cada 30 min de 07:00 a 12:30 UTC (L-V)
  #   - cron: '0 13 * * 1-5'         # repaso 13:00 UTC (15:00 verano)
  #   - cron: '0 15 * * 1-5'         # repaso 15:00 UTC (17:00 verano)
  workflow_dispatch:               # disparo manual (unica via mientras BEMS este en pausa)

concurrency:
  group: detector-bems
  cancel-in-progress: false        # no pisar una corrida en marcha; la nueva espera

jobs:
  detectar:
    runs-on: ubuntu-latest
    timeout-minutes: 25            # por debajo del intervalo de 30 min (anti-zombi)
    steps:
      - name: Descargar el repo
        uses: actions/checkout@v4

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install keepa supabase requests curl_cffi   # curl_cffi: API BEMS (Cloudflare)

      - name: Ejecutar detector
        env:
          SUPABASE_URL:     ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:     ${{ secrets.SUPABASE_KEY }}
          KEEPA_API_KEY:    ${{ secrets.KEEPA_API_KEY }}
          BEMS_LOGIN:       ${{ secrets.BEMS_LOGIN }}
          BEMS_PASSWORD:    ${{ secrets.BEMS_PASSWORD }}
          BEMS_SECRET_KEY:  ${{ secrets.BEMS_SECRET_KEY }}
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -u moloka_detector_bems.py
