name: Moloka - Web Miravia

# Se lanza A MANO desde Actions con "Run workflow".
# (Más adelante se le puede poner cron nocturno para refrescar el catálogo.)
on:
  workflow_dispatch:

jobs:
  web-miravia:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el repo
        uses: actions/checkout@v4

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: pip install -U requests supabase

      - name: Volcar Miravia a la web
        env:
          MIRAVIA_APP_KEY: ${{ secrets.MIRAVIA_APP_KEY }}
          MIRAVIA_APP_SECRET: ${{ secrets.MIRAVIA_APP_SECRET }}
          MIRAVIA_ACCESS_TOKEN: ${{ secrets.MIRAVIA_ACCESS_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python -u moloka_web_miravia.py
