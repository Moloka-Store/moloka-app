# ============================================================
# Moloka - Actualizar App en la nube
# Ubicacion en el repo: .github/workflows/actualizar-app.yml
#
# Lanza moloka_actualizar_nube.py en un runner de GitHub.
# El script descarga los informes del buzon (Supabase Storage 'informes/entrada'),
# lee el modo (rapida/completa) del _solicitud.json que deja la app, y vuelca todo a Supabase.
#
# >>> SIN RELOJ <<<  Solo se ejecuta cuando TU lo lanzas:
#   - A mano: pestana Actions -> "Run workflow".
#   - En el futuro: boton en la app (via Edge Function que llama a workflow_dispatch).
# No hay 'schedule': nada se dispara solo, no se vacian tokens sin querer.
#
# Secrets del repo necesarios (Settings -> Secrets and variables -> Actions):
#   SUPABASE_KEY  KEEPA_API_KEY  MIRAVIA_APP_KEY  MIRAVIA_APP_SECRET
#   MIRAVIA_ACCESS_TOKEN  SUPABASE_URL (opcional)
# ============================================================
name: Moloka - Actualizar App

on:
  workflow_dispatch:        # SOLO disparo manual / por boton. SIN reloj (schedule eliminado).

jobs:
  actualizar:
    runs-on: ubuntu-latest
    timeout-minutes: 240     # la COMPLETA (~1h45 por el goteo de Keepa) cabe de sobra; antes 120 la mataba
    steps:
      - name: Descargar el repo
        uses: actions/checkout@v4

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar actualizacion
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:         ${{ secrets.SUPABASE_KEY }}
          KEEPA_API_KEY:        ${{ secrets.KEEPA_API_KEY }}
          MIRAVIA_APP_KEY:      ${{ secrets.MIRAVIA_APP_KEY }}
          MIRAVIA_APP_SECRET:   ${{ secrets.MIRAVIA_APP_SECRET }}
          MIRAVIA_ACCESS_TOKEN: ${{ secrets.MIRAVIA_ACCESS_TOKEN }}
        run: python moloka_actualizar_nube.py
