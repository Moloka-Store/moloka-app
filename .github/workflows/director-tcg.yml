name: Moloka - Director TCG

on:
  workflow_dispatch:
    inputs:
      tipo:
        description: 'diario (solo novedades) o completo (todo, lunes noche)'
        type: choice
        options:
          - diario
          - completo
        default: diario

concurrency:
  group: director-tcg
  cancel-in-progress: false

jobs:
  director:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          sudo apt-get update && sudo apt-get install -y libzbar0
          pip install curl_cffi beautifulsoup4 openpyxl pandas supabase keepa requests pyzbar pillow anthropic scipy numpy

      - name: 1) Preparar (descarga TCG + biblioteca + recados)
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TCG_USER:             ${{ secrets.TCG_USER }}
          TCG_PASS:             ${{ secrets.TCG_PASS }}
        run: python -u director_tcg_prep.py --tipo ${{ inputs.tipo }}

      - name: 2) Actualizar la web
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:         ${{ secrets.SUPABASE_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TELEGRAM_TOKEN:       ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:     ${{ secrets.TELEGRAM_CHAT_ID }}
          VERCEL_DEPLOY_HOOK:   ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: python -u moloka_actualizar_tcg.py

      - name: 3) Novedades web (detectar altas nuevas -> rank -> recado)
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:         ${{ secrets.SUPABASE_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          KEEPA_API_KEY:        ${{ secrets.KEEPA_API_KEY }}
          TELEGRAM_TOKEN:       ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:     ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -u novedades_web_tcg.py

      - name: 4) Generar fichas BORRADOR de las novedades
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:         ${{ secrets.SUPABASE_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          KEEPA_API_KEY:        ${{ secrets.KEEPA_API_KEY }}
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          RECADO_LOTE_PATH:     fabrica_lote/_solicitud_auto.json
          TELEGRAM_TOKEN:       ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:     ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -u robot_lote.py

      - name: 5) Escanear FBA
        env:
          SUPABASE_URL:      ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:      ${{ secrets.SUPABASE_KEY }}
          KEEPA_API_KEY:     ${{ secrets.KEEPA_API_KEY }}
          GH_PAT:            ${{ secrets.GH_PAT }}
          AUTORELANZAR_MIN:  '315'
          AUTORELANZAR_TIPO: ${{ inputs.tipo }}
          TELEGRAM_TOKEN:    ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:  ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -u moloka_escaner_nube.py
