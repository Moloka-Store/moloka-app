name: Moloka - Sonda HEO

on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Instalar dependencias
        run: pip install requests
      - name: Sonda HEO (ver estructura)
        env:
          HEO_USER: ${{ secrets.HEO_USER }}
          HEO_PASS: ${{ secrets.HEO_PASS }}
        run: python -u heo_probe.py
