name: Moloka - Director HEO

on:
  workflow_dispatch:
    inputs:
      tipo:
        description: 'diario (solo novedades) o completo (todo)'
        type: choice
        options:
          - diario
          - completo
        default: diario

concurrency:
  group: director-heo
  cancel-in-progress: false

jobs:
  director:
    runs-on: ubuntu-latest
    env:
      CARPETA_ESCANER: escaner_heo
      CARPETA_CKPT: escaner_ckpt_heo
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install openpyxl supabase keepa pandas requests

      - name: 1) Preparar (descarga API HEO + filtro Funko/UG/ofertas + recado)
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          HEO_USER:             ${{ secrets.HEO_USER }}
          HEO_PASS:             ${{ secrets.HEO_PASS }}
        run: python -u director_heo_prep.py --tipo ${{ inputs.tipo }}

      - name: 2) Escanear FBA (Keepa API)
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:         ${{ secrets.SUPABASE_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          KEEPA_API_KEY:    ${{ secrets.KEEPA_API_KEY }}
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GH_PAT:               ${{ secrets.GH_PAT }}
          AUTORELANZAR_MIN:     '315'
          AUTORELANZAR_WORKFLOW: director-heo.yml
          AUTORELANZAR_TIPO:    ${{ inputs.tipo }}
        run: python -u moloka_escaner_nube.py
