name: Test BEMS Cloudflare

on:
  workflow_dispatch:

jobs:
  test-bems:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install curl_cffi
        run: pip install curl_cffi

      - name: Run BEMS Cloudflare test
        env:
          BEMS_LOGIN: ${{ secrets.BEMS_LOGIN }}
          BEMS_PASSWORD: ${{ secrets.BEMS_PASSWORD }}
          BEMS_SECRET_KEY: ${{ secrets.BEMS_SECRET_KEY }}
        run: python -u test_bems_cloudflare.py
