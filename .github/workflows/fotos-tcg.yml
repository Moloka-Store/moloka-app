name: Moloka - Fotos TCG (Keepa del corte)

on:
  workflow_dispatch:

jobs:
  fotos:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Dependencias Python
        run: pip install keepa supabase openpyxl

      - name: Robot FOTOS TCG
        env:
          KEEPA_API_KEY: ${{ secrets.KEEPA_API_KEY }}
          SUPABASE_URL:  ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:  ${{ secrets.SUPABASE_KEY }}
        run: python -u robot_fotos_tcg.py
