name: Moloka - Director OcioStock

on:
  workflow_dispatch:
    inputs:
      tipo:
        description: 'diario (solo novedades) o completo (todo)'
        type: choice
        options:
          - diario
          - completo
        default: diario

concurrency:
  group: director-ociostock
  cancel-in-progress: false

jobs:
  director:
    runs-on: ubuntu-latest
    env:
      CARPETA_ESCANER: escaner_ociostock
      CARPETA_CKPT: escaner_ckpt_ociostock
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install openpyxl supabase keepa pandas requests xlrd

      - name: 1) Preparar (descarga feed OcioStock + recado)
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          OCIOSTOCK_FEED_URL:   ${{ secrets.OCIOSTOCK_FEED_URL }}
        run: python -u director_ociostock_prep.py --tipo ${{ inputs.tipo }}

      - name: 2) Escanear FBA (Keepa API, marcas elegidas)
        env:
          SUPABASE_URL:  ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:  ${{ secrets.SUPABASE_KEY }}
          KEEPA_API_KEY: ${{ secrets.KEEPA_API_KEY }}
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -u moloka_escaner_nube.py
